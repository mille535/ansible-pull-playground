- name: create ansible user
  user:
    name: ansible
    system: yes

- name: copy sudoers_ansible
  copy:
    src: files/sudoers_ansible
    dest: /etc/sudoers.d/ansible
    owner: root
    group: root
    mode: 0440

- name: change ansible.log ownership to ansible servuce user
  file:
    path: /var/log/ansible.log
    owner: ansible
    group: ansible
    mode: 0644
