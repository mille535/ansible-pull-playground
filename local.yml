- hosts: localhost
  connection: local
  become: true
  become_method: sudo

  pre_tasks:
    - name: pre-run | update package cache (arch btw)
      pacman: update_cache=yes
      changed_when: False

  tasks:
    - include_tasks: tasks/users.yml
    - include_tasks: tasks/cron.yml
    - include_tasks: tasks/packages.yml
